# ==========================
# ===  General settings  ===
# ==========================

# We will override this at the very end to ensure plugins don't mess it up
# set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"

set -g history-limit 20000
set -g buffer-limit 20
set -sg escape-time 0
set -g display-time 1500
set -g remain-on-exit off
set -g repeat-time 300
setw -g allow-rename off
setw -g automatic-rename off
setw -g aggressive-resize on

# Change prefix key to C-a, easier to type, same to "screen"
unbind C-b
set -g prefix C-a
set -g prefix2 F11

# Set parent terminal title to reflect current window in tmux session
set -g set-titles on
set -g set-titles-string "#I:#W"

# Start index of window/pane with 1
set -g base-index 0
setw -g pane-base-index 0

# Enable mouse support
set -g mouse on


# ==========================
# ===    Key bindings    ===
# ==========================

# Reload tmux configuration
# bind C-r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Select pane and windows
bind -r Tab last-pane

# Zoom pane
bind + resize-pane -Z

# Link window
bind L command-prompt -p "Link window from (session:window): " "link-window -s %% -a"

# Swap panes back and forth with 1st pane
bind \\ if '[ #{pane_index} -eq 1 ]' \
     'swap-pane -s "!"' \
     'select-pane -t:.1 ; swap-pane -d -t 1 -s "!"'

# Hide status bar on demand
bind C-s if -F '#{s/off//:status}' 'set status off' 'set status on'


# ==================================================
# === Window monitoring for activity and silence ===
# ==================================================
bind m setw monitor-activity \; display-message 'Monitor window activity [#{?monitor-activity,ON,OFF}]'
bind M if -F '#{monitor-silence}' \
    'setw monitor-silence 0 ; display-message "Monitor window silence [OFF]"' \
    'command-prompt -p "Monitor silence: interval (s)" "setw monitor-silence %%"'

# Activity bell and whistles
set -g visual-activity on
set -g visual-silence on


# ================================================
# ===      Copy mode, scroll and clipboard     ===
# ================================================
set -g @copy_use_osc52_fallback on

# Prefer vi style key table
setw -g mode-keys vi
bind C-p choose-buffer

# Trigger copy mode
bind -n M-Up copy-mode

# Scroll bindings
bind -T copy-mode-vi M-Up              send-keys -X scroll-up
bind -T copy-mode-vi M-Down            send-keys -X scroll-down
bind -T copy-mode-vi M-PageUp          send-keys -X halfpage-up
bind -T copy-mode-vi M-PageDown        send-keys -X halfpage-down
bind -T copy-mode-vi PageDown          send-keys -X page-down
bind -T copy-mode-vi PageUp            send-keys -X page-up
bind -T copy-mode-vi WheelUpPane       select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane     select-pane \; send-keys -X -N 2 scroll-down

# Reattach to user namespace (macOS specific hack, harmless on Linux)
if -b "command -v reattach-to-user-namespace > /dev/null 2>&1" \
    "run 'tmux set -g default-command \"exec $(tmux show -gv default-shell) 2>/dev/null & reattach-to-user-namespace -l $(tmux show -gv default-shell)\"'"

set -g default-command "${SHELL}"

# --- KEYBOARD COPY BINDINGS ---
# Fixed: Hardcoded paths instead of variables
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"
bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"
bind -T copy-mode-vi Y     send-keys -X copy-line \;\
    run "tmux save-buffer - | ~/.config/tmux/yank.sh"
bind -T copy-mode-vi D     send-keys -X copy-end-of-line \;\
    run "tmux save-buffer - | ~/.config/tmux/yank.sh"
bind -T copy-mode-vi C-j   send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"
bind -T copy-mode-vi A     send-keys -X append-selection-and-cancel \;\
    run "tmux save-buffer - | ~/.config/tmux/yank.sh"

# Fastcopy settings
bind-key f run-shell -b tmux-fastcopy
set-option -g @fastcopy-shift-action "tmux -2 new-window nvim {}"
set-option -g set-clipboard on
set-option -g @fastcopy-action 'tmux load-buffer -w -'

# --- MOUSE COPY BINDINGS (FIXED FOR TMUX 3.4) ---
# 1. Clear any old bindings
unbind -T copy-mode-vi MouseDragEnd1Pane

# 2. Bind DragEnd to pipe selection to yank.sh
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"

# 3. Double/Triple click support
bind -T copy-mode-vi DoubleClick1Pane  send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"
bind -T copy-mode-vi TripleClick1Pane  send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"

# 4. Single click clears selection
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection


# Press Prefix, then 'e', then 'b'
 bind-key e switch-client -T edit-mode
 bind-key -T edit-mode b run-shell "~/.config/tmux/editpane.sh"

   bind-key e {
     switch-client -T edit-mode
       display-message "Edit Mode: [e]dit [r]efresh-env [c]onfig"
   }

# 2. Define the keys in that mode
bind-key -T edit-mode e run-shell "~/.config/tmux/editpane.sh"
bind-key -T edit-mode r run-shell "~/.config/tmux/renew_env.sh"
# 1. Enter the mode and show a message in the status line


